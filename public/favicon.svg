<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="GSF">
  <rect class="bg" width="128" height="128" rx="21"/>
  <!--
    Custom G path — GSF brand symbol
    viewBox 128×128, center (64,64), radius 38, stroke 18
    Opening: (88,34)→(102,58), sweep=0 (CCW), large-arc=1
    Crossbar: y=58 (above center 64 → differentiates from Google G)
  -->
  <path class="g"
        d="M 88,34 A 38,38 0 1,0 102,58 L 66,58"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <style>
    .bg { fill: #143628; }
    .g  { stroke: #F7F5F0; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #F7F5F0; }
      .g  { stroke: #143628; }
    }
  </style>
</svg>
